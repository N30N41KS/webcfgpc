<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Знания | CyberCore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root {
            --primary: #6750A4;
            --surface: #fff;
            --outline: #e8def8;
            --text-sub: #79747e;
        }

        /* Сетка карточек */
        .wiki-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Сама карточка */
        .wiki-item {
            background: var(--surface);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--outline);
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wiki-item:hover {
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(103, 80, 164, 0.15);
            transform: translateY(-5px);
        }

        .wiki-item h3 {
            color: var(--primary);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Кнопка подробнее */
        .read-more-btn {
            background: #f3edf7;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 12px;
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            transition: 0.2s;
        }

        .read-more-btn:hover { background: var(--primary); color: white; }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 750px;
            margin: 40px auto;
            padding: 40px;
            border-radius: 32px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 25px; right: 25px;
            cursor: pointer;
            font-size: 28px;
            color: var(--text-sub);
        }


    </style>
</head>
<body>
    <nav class="mui-nav">
        <div class="logo">CyberCore</div>
        <ul class="nav-links">
            <li><a href="index.html">О нашей компании</a></li>
            <li><a href="config.html">Подбор</a></li>
            <li><a href="contacts.html">Контакты</a></li>
            <li><a href="wiki.html" class="active">Знания</a></li>
            <li><a href="cart.html">Корзина</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="mui-card">
            <h2><span class="material-symbols-rounded">menu_book</span> Академия CyberCore</h2>
            <p>Статьи и гайды от экспертов по сборке и настройке ПК.</p>
            <div class="wiki-grid" id="wikiContent">
                </div>
        </div>
    </main>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="material-symbols-rounded close-modal" onclick="closeModal()">close</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const articles = {
            air: { icon: "air", title: "Охлаждение", preview: "Как правильно поставить ПК.", content: "Не ставьте ПК на ковер. Блок питания засасывает пыль, что ведет к перегреву. Чистите корпус раз в полгода." },
            thermal: { icon: "thermostat", title: "Термопаста", preview: "Когда пора менять?", content: "Меняйте пасту раз в 2 года. Если температура в простое выше 50°C — пора обновлять интерфейс." },
            psu: { icon: "bolt", title: "Выбор БП", preview: "Что такое 80 PLUS?", content: "Сертификат Gold гарантирует высокий КПД. Хороший БП защищает систему от скачков напряжения." },
            ram: { icon: "memory", title: "Магия ОЗУ", preview: "Как ускорить в 2 раза.", content: "Ставьте плашки во 2 и 4 слоты. Это активирует двухканальный режим, что критично для FPS." },
            undervolt: { icon: "cyclone", title: "Андервольтинг", preview: "Тихая видеокарта.", content: "Снижение напряжения через MSI Afterburner уберет шум вентиляторов без потери FPS." },
            monitor: { icon: "desktop_windows", title: "Мониторы", preview: "Зачем нужны 144Гц.", content: "Высокая герцовка делает картинку плавной. Не забудьте включить её в настройках Windows!" },
            storage: { icon: "storage", title: "SSD vs HDD", preview: "Почему Windows тормозит.", content: "Система должна быть только на SSD. HDD оставьте только для хранения фото и видео." },
            upscaling: { icon: "shutter_speed", title: "DLSS и FSR", preview: "Бесплатные кадры.", content: "Технологии ИИ позволяют играть в высоком разрешении даже на слабых видеокартах." },
            windows: { icon: "auto_fix", title: "Настройка Win", preview: "Чистим систему.", content: "Отключите фоновые приложения и включите 'Игровой режим'. Это освободит ресурсы для игр." },
            cable: { icon: "settings_input_component", title: "Кабели", preview: "Порядок в корпусе.", content: "Кабель-менеджмент — это не только красота, но и правильный обдув всех компонентов." }
        };

        function renderWiki() {
            const grid = document.getElementById('wikiContent');
            grid.innerHTML = Object.keys(articles).map(id => `
                <div class="wiki-item">
                    <h3><span class="material-symbols-rounded">${articles[id].icon}</span> ${articles[id].title}</h3>
                    <p>${articles[id].preview}</p>
                    <button class="read-more-btn" onclick="openArticle('${id}')">Читать подробнее</button>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const a = articles[id];
            document.getElementById('modalBody').innerHTML = `<h2>${a.title}</h2><p>${a.content}</p>`;
            document.getElementById('articleModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('articleModal').style.display = 'none'; }
        
        function searchWiki() {
            let val = document.getElementById('wikiSearch').value.toLowerCase();
            let items = document.getElementsByClassName('wiki-item');
            for (let i of items) { i.style.display = i.textContent.toLowerCase().includes(val) ? "" : "none"; }
        }

        window.onclick = e => { if (e.target.className == 'modal') closeModal(); }
        renderWiki();
    </script>
</body>
</html>
